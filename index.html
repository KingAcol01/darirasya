<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu Sayang ❤️</title>
    <style>
        /* CSS UNTUK TAMPILAN ROMANTIS */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffebee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            border: 2px solid #ffc1e3;
            z-index: 1;
        }

        h1 { color: #d81b60; }
        p { color: #ad1457; font-size: 1.1rem; }

        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 20px;
            font-weight: bold;
        }

        button:hover {
            background-color: #f50057;
            transform: scale(1.1);
        }

        /* CSS UNTUK JUMPSCARE (Awalnya Tersembunyi) */
        #jumpscare-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #ghost-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .shake {
            animation: shake-animation 0.1s infinite;
        }

        @keyframes shake-animation {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(-1px, -1px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(-1deg); }
            100% { transform: translate(-1px, 2px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>❤️ Untuk Seseorang yang Spesial ❤️</h1>
        <p>Aku punya sesuatu yang ingin aku katakan padamu...</p>
        <p>Silakan klik tombol di bawah untuk melihat pesan rahasianya.</p>
        <button onclick="startScare()">Klik untuk Pesan Cinta 💌</button>
    </div>

    <div id="jumpscare-container">
        <audio id="scream-sound">
            <source src="https://www.soundjay.com/human/sounds/person-screaming-01.mp3" type="audio/mpeg">
        </audio>
        <img id="ghost-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6A7t7Y9C-Y_t8oHq005j8vGkYv-12yT0pRA&s" alt="Jumpscare">
    </div>

    <script>
        function startScare() {
            // Tampilkan container hantu
            const jumpscare = document.getElementById('jumpscare-container');
            const audio = document.getElementById('scream-sound');
            
            jumpscare.style.display = 'flex';
            
            // Tambahkan efek getar pada gambar
            document.getElementById('ghost-img').classList.add('shake');

            // Putar suara (browser mewajibkan interaksi user terlebih dahulu, jadi tombol ini memicu audionya)
            audio.play().catch(e => console.log("Audio gagal diputar:", e));

            // Membuat layar full screen otomatis (opsional, beberapa browser mungkin memblokir)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
